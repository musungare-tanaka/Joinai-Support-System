# PostgreSQL datasource configuration
spring.datasource.url=${SPRINGAI_DB_URL:jdbc:postgresql://localhost:5432/joinai}

spring.datasource.username=${SPRINGAI_DB_USERNAME:postgres}
spring.datasource.password=${SPRINGAI_DB_PASSWORD:root}
spring.datasource.driver-class-name=${SPRINGAI_DB_DRIVER:org.postgresql.Driver}

# Hibernate JPA configuration for PostgreSQL
spring.jpa.properties.hibernate.dialect=${SPRINGAI_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRINGAI_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRINGAI_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRINGAI_FORMAT_SQL:true}

# HikariCP settings for PostgreSQL
spring.datasource.hikari.maximum-pool-size=${SPRINGAI_DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${SPRINGAI_DB_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${SPRINGAI_DB_IDLE_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=${SPRINGAI_DB_MAX_LIFETIME:1800000}
spring.datasource.hikari.connection-timeout=${SPRINGAI_DB_CONNECTION_TIMEOUT:30000}

# MongoDB connection
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/joinai}

# Email configuration
spring.mail.host=${SPRINGAI_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRINGAI_MAIL_PORT:587}
spring.mail.username=${SPRINGAI_MAIL_USERNAME:musungaretanaka@gmail.com}
spring.mail.password=${SPRINGAI_MAIL_PASSWORD:}
spring.mail.protocol=${SPRINGAI_MAIL_PROTOCOL:smtp}
spring.mail.properties.mail.smtp.auth=${SPRINGAI_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRINGAI_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRINGAI_MAIL_SMTP_STARTTLS_REQUIRED:true}
#spring.mail.properties.mail.debug=true

# OpenAI configuration
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:}

# Server configuration
server.port=8083
secret.key=${SECRET_KEY:}
